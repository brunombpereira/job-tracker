# sidekiq-cron schedule — loaded by config/initializers/sidekiq.rb on boot.
# Each entry fires one ScraperRunJob for a single source. Sources are
# staggered by 5 minutes so they don't all hit the network at once.
#
# History note: Adzuna + ITJobs.pt entries were removed once Adzuna's free
# tier got revoked and ITJobs.pt closed its public RSS behind Cloudflare.
# LinkedIn / Indeed are imported one URL at a time via /offers/import_url
# (see OfferUrlImporter) — bulk scraping there is infeasible.

remotive_daily:
  cron: "0 6 * * *"
  class: ScraperRunJob
  queue: scrapers
  description: "Remotive · open JSON API"
  args:
    - "remotive"
    - category: "software-dev"

landing_jobs_daily:
  cron: "5 6 * * *"
  class: ScraperRunJob
  queue: scrapers
  description: "Landing.jobs · REST API"
  args:
    - "landing_jobs"
    - limit: 50

weworkremotely_daily:
  cron: "10 6 * * *"
  class: ScraperRunJob
  queue: scrapers
  description: "We Work Remotely · RSS"
  args:
    - "weworkremotely"
    - category: "remote-programming-jobs"

hn_whoshiring_weekly:
  cron: "15 6 * * 1"          # Mondays only — thread refreshes monthly
  class: ScraperRunJob
  queue: scrapers
  description: "HN Who's Hiring · Firebase API"
  args:
    - "hn_whoshiring"
    - keywords: ""

net_empregos_daily:
  cron: "20 6 * * *"
  class: ScraperRunJob
  queue: scrapers
  description: "Net-Empregos · RSS"
  args:
    - "net_empregos"
    - keywords: "developer"

teamlyzer_daily:
  cron: "25 6 * * *"
  class: ScraperRunJob
  queue: scrapers
  description: "Teamlyzer · HTML"
  args:
    - "teamlyzer"
    - {}
