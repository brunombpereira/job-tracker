# sidekiq-cron schedule — loaded by config/initializers/sidekiq.rb on boot.
# Each entry fires one ScraperRunJob for a single source. Sources are
# staggered by 5 minutes so they don't all hit the network at once.
#
# History note: Adzuna + ITJobs.pt entries were removed once Adzuna's free
# tier got revoked and ITJobs.pt closed its public RSS behind Cloudflare.
# HN Who's Hiring also dropped — too US-remote-skewed and signal-to-noise
# was below the threshold for the user's workflow.
# LinkedIn / Indeed are imported one URL at a time via /offers/import_url
# (see OfferUrlImporter) — bulk scraping there is infeasible.

remotive_daily:
  cron: "0 6 * * *"
  class: ScraperRunJob
  queue: scrapers
  description: "Remotive · open JSON API"
  args:
    - "remotive"
    - category: "software-dev"

landing_jobs_daily:
  cron: "5 6 * * *"
  class: ScraperRunJob
  queue: scrapers
  description: "Landing.jobs · 100 most recent listings"
  args:
    - "landing_jobs"
    - limit: 100

weworkremotely_daily:
  cron: "10 6 * * *"
  class: ScraperRunJob
  queue: scrapers
  description: "We Work Remotely · RSS"
  args:
    - "weworkremotely"
    - category: "remote-programming-jobs"

net_empregos_daily:
  cron: "20 6 * * *"
  class: ScraperRunJob
  queue: scrapers
  description: "Net-Empregos · HTML · 20 pages of Programação (~360 listings)"
  args:
    - "net_empregos"
    - pages: 20

teamlyzer_daily:
  cron: "25 6 * * *"
  class: ScraperRunJob
  queue: scrapers
  description: "Teamlyzer · HTML · 3 pages (~68 listings)"
  args:
    - "teamlyzer"
    - pages: 3

linkedin_daily:
  cron: "30 6 * * *"
  class: ScraperRunJob
  queue: scrapers
  description: "LinkedIn · guest jobs API · 3 profile-targeted queries · worldwide"
  args:
    - "linkedin"
    - keywords:
        - "junior developer"
        - "ruby on rails developer"
        - "react developer"
      time: "month"
      pages: 4
