# Render Blueprint — provisions the JobTracker stack on render.com.
#
# Layout:
#   - web service "jobtracker-api"     · Rails API (Puma)
#   - worker     "jobtracker-worker"   · Sidekiq, processes :default + :scrapers
#   - redis      "jobtracker-redis"    · Sidekiq broker
#   - database   "jobtracker-db"       · PostgreSQL 16
#
# Quick start:
#   1. Push this repo to your own GitHub remote.
#   2. On render.com: New + → Blueprint → connect the repo → Apply
#   3. After provisioning, in the jobtracker-api dashboard set:
#        - CORS_ORIGINS     → your frontend URL
#        - API_ACCESS_TOKEN → a shared secret (see DEPLOY.md); required,
#          or the API — including your profile data — is public
#
# Free tier notes:
#   - Web service spins down after 15 min idle; first request takes ~30s.
#   - Worker keeps running. Free Redis is 25MB / volatile.
#   - PostgreSQL on free tier is destroyed after 90 days unless upgraded.

services:
  - type: web
    name: jobtracker-api
    runtime: ruby
    plan: free
    region: frankfurt
    branch: main
    rootDir: backend
    buildCommand: ./bin/render-build
    startCommand: bundle exec puma -C config/puma.rb
    healthCheckPath: /up
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: jobtracker-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: jobtracker-redis
          type: redis
          property: connectionString
      - key: RAILS_ENV
        value: production
      - key: RAILS_LOG_TO_STDOUT
        value: "true"
      - key: RAILS_SERVE_STATIC_FILES
        value: "true"
      - key: SECRET_KEY_BASE
        generateValue: true
      - key: SIDEKIQ_USERNAME
        value: admin
      - key: SIDEKIQ_PASSWORD
        generateValue: true
      - key: CORS_ORIGINS
        sync: false       # set in dashboard after frontend deploys
      - key: API_ACCESS_TOKEN
        sync: false       # shared-secret API gate — set in dashboard

  - type: worker
    name: jobtracker-worker
    runtime: ruby
    plan: free
    region: frankfurt
    branch: main
    rootDir: backend
    buildCommand: bundle install
    startCommand: bundle exec sidekiq -C config/sidekiq.yml
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: jobtracker-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: jobtracker-redis
          type: redis
          property: connectionString
      - key: RAILS_ENV
        value: production
      - key: RAILS_LOG_TO_STDOUT
        value: "true"
      - key: SECRET_KEY_BASE
        fromService:
          name: jobtracker-api
          type: web
          envVarKey: SECRET_KEY_BASE

  - type: redis
    name: jobtracker-redis
    plan: free
    region: frankfurt
    ipAllowList: []     # empty = only-internal; web + worker have access via REDIS_URL

databases:
  - name: jobtracker-db
    plan: free
    region: frankfurt
    databaseName: jobtracker_production
    user: jobtracker
