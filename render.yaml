# Render Blueprint — provisions the JobTracker Rails API + PostgreSQL on render.com
#
# Quick start:
#   1. Push this file to main on github.com/brunombpereira/job-tracker
#   2. On render.com: New + → Blueprint → connect this repo → Apply
#   3. After provisioning, set the CORS_ORIGINS env var to your Vercel frontend URL.
#
# Free tier notes:
#   - Web service spins down after 15 min idle; first request takes ~30s to wake.
#   - PostgreSQL on free tier is destroyed after 90 days unless upgraded.

services:
  - type: web
    name: jobtracker-api
    runtime: ruby
    plan: free
    region: frankfurt
    branch: main
    rootDir: backend
    buildCommand: ./bin/render-build
    startCommand: bundle exec puma -C config/puma.rb
    healthCheckPath: /up
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: jobtracker-db
          property: connectionString
      - key: RAILS_ENV
        value: production
      - key: RAILS_LOG_TO_STDOUT
        value: "true"
      - key: RAILS_SERVE_STATIC_FILES
        value: "true"
      - key: SECRET_KEY_BASE
        generateValue: true
      - key: CORS_ORIGINS
        # Set this once the frontend is deployed.
        # Example: https://job-tracker-ui.vercel.app,https://www.example.com
        sync: false

databases:
  - name: jobtracker-db
    plan: free
    region: frankfurt
    databaseName: jobtracker_production
    user: jobtracker
